<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EMSP Digital - Gestion utilisateurs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --color-primary: #16A34A;
            --color-primary-dark: #15803D;
            --color-bg: #F9FAFB;
            --color-surface: #FFFFFF;
            --color-text: #111827;
            --color-muted: #6B7280;
            --color-border: #E5E7EB;
            --color-danger: #DC2626;
            --color-success: #16A34A;
            --shadow: 0 18px 40px rgba(17, 24, 39, 0.08);
            --radius: 12px;
            --transition: 170ms ease;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-width: 360px;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            border: 0;
            cursor: pointer;
        }

        .app-header {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(249, 250, 251, 0.92);
            border-bottom: 1px solid var(--color-border);
            backdrop-filter: blur(14px);
        }

        .header-inner,
        main {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            min-height: 72px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            width: 40px;
            height: 40px;
            color: var(--color-primary);
            background: #DCFCE7;
            border: 1px solid #BBF7D0;
            border-radius: var(--radius);
        }

        .brand h1 {
            margin: 0;
            font-size: 1rem;
            line-height: 1.2;
        }

        .brand p {
            margin: 2px 0 0;
            color: var(--color-muted);
            font-size: 0.86rem;
        }

        main {
            padding: 28px 0 48px;
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1fr 180px;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeInUp 420ms ease both;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            width: 18px;
            height: 18px;
            color: var(--color-muted);
            transform: translateY(-50%);
        }

        .input,
        .select {
            width: 100%;
            height: 44px;
            color: var(--color-text);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .input {
            padding: 0 14px 0 44px;
        }

        .select {
            padding: 0 12px;
        }

        .input:focus,
        .select:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
        }

        .panel {
            overflow: hidden;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            animation: fadeInUp 520ms ease both;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 780px;
        }

        th,
        td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--color-border);
        }

        th {
            color: var(--color-muted);
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        tbody tr {
            transition: background var(--transition);
        }

        tbody tr:hover {
            background: #F9FAFB;
        }

        .user-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            display: grid;
            place-items: center;
            width: 38px;
            height: 38px;
            color: var(--color-primary);
            background: #DCFCE7;
            border-radius: 50%;
            font-weight: 700;
        }

        .name {
            font-weight: 600;
        }

        .email {
            margin-top: 2px;
            color: var(--color-muted);
            font-size: 0.86rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 26px;
            padding: 0 10px;
            color: var(--color-primary-dark);
            background: #DCFCE7;
            border: 1px solid #BBF7D0;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 40px;
            padding: 0 14px;
            border-radius: var(--radius);
            transition: transform var(--transition), background var(--transition), color var(--transition), border-color var(--transition);
        }

        .btn:hover {
            transform: scale(1.02);
        }

        .btn:active,
        .btn.pulse {
            animation: pulseClick 260ms ease;
        }

        .btn-primary {
            color: #FFFFFF;
            background: var(--color-primary);
        }

        .btn-primary:hover {
            background: var(--color-primary-dark);
        }

        .btn-ghost {
            color: var(--color-text);
            background: transparent;
            border: 1px solid var(--color-border);
        }

        .btn-ghost:hover {
            background: #F3F4F6;
        }

        .btn-danger {
            color: var(--color-danger);
            background: transparent;
            border: 1px solid #FECACA;
        }

        .btn-danger:hover {
            background: #FEF2F2;
        }

        .icon-btn {
            width: 38px;
            min-height: 38px;
            padding: 0;
        }

        dialog {
            width: min(560px, calc(100% - 32px));
            padding: 0;
            border: 0;
            border-radius: 14px;
            box-shadow: var(--shadow);
        }

        dialog::backdrop {
            background: rgba(17, 24, 39, 0.42);
        }

        .dialog-content {
            background: var(--color-surface);
            animation: slideDown 220ms ease both;
        }

        .dialog-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid var(--color-border);
        }

        .dialog-head h2 {
            margin: 0;
            font-size: 1rem;
        }

        form {
            display: grid;
            gap: 14px;
            padding: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        label {
            display: grid;
            gap: 7px;
            color: var(--color-muted);
            font-size: 0.86rem;
            font-weight: 500;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding-top: 6px;
        }

        .empty {
            display: none;
            padding: 40px 20px;
            color: var(--color-muted);
            text-align: center;
        }

        .empty.is-visible {
            display: block;
        }

        .toast-stack {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 50;
            display: grid;
            gap: 10px;
            width: min(340px, calc(100% - 36px));
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-left: 4px solid var(--color-success);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            animation: fadeInUp 220ms ease both;
        }

        .toast.error {
            border-left-color: var(--color-danger);
        }

        .toast svg {
            width: 18px;
            height: 18px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                max-height: 0;
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                max-height: 720px;
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseClick {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.04);
            }
            100% {
                transform: scale(1);
            }
        }

        @media (max-width: 720px) {
            .header-inner {
                min-height: 82px;
            }

            .brand p {
                display: none;
            }

            .toolbar,
            .form-grid {
                grid-template-columns: 1fr;
            }

            .btn span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">
                    <i data-lucide="graduation-cap"></i>
                </div>
                <div>
                    <h1>EMSP Digital</h1>
                    <p>Gestion des utilisateurs</p>
                </div>
            </div>
            <button class="btn btn-primary" id="addBtn" type="button">
                <i data-lucide="plus"></i>
                <span>Ajouter</span>
            </button>
        </div>
    </header>

    <main>
        <section class="toolbar" aria-label="Recherche et filtres">
            <div class="input-wrap">
                <i data-lucide="search"></i>
                <input class="input" id="searchInput" type="search" placeholder="Rechercher par nom, email ou rôle">
            </div>
            <select class="select" id="roleFilter" aria-label="Filtrer par rôle">
                <option value="all">Tous les rôles</option>
                <option value="admin">Admin</option>
                <option value="enseignant">Enseignant</option>
                <option value="etudiant">Étudiant</option>
            </select>
        </section>

        <section class="panel" aria-labelledby="usersTitle">
            <div class="table-wrap">
                <table>
                    <caption id="usersTitle" style="position:absolute; left:-9999px;">Liste des utilisateurs EMSP</caption>
                    <thead>
                        <tr>
                            <th>Utilisateur</th>
                            <th>Rôle</th>
                            <th>Classe / Spécialité</th>
                            <th>Statut</th>
                            <th style="text-align:right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody"></tbody>
                </table>
            </div>
            <div class="empty" id="emptyState">Aucun utilisateur trouvé.</div>
        </section>
    </main>

    <dialog id="userDialog">
        <div class="dialog-content">
            <div class="dialog-head">
                <h2 id="dialogTitle">Ajouter un utilisateur</h2>
                <button class="btn btn-ghost icon-btn" id="closeDialogBtn" type="button" aria-label="Fermer">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <form id="userForm">
                <input id="userId" type="hidden">
                <div class="form-grid">
                    <label>
                        Nom complet
                        <input class="input" id="nameInput" type="text" required placeholder="Awa Diop">
                    </label>
                    <label>
                        Email
                        <input class="input" id="emailInput" type="email" required placeholder="awa@emsp.local">
                    </label>
                </div>
                <div class="form-grid">
                    <label>
                        Rôle
                        <select class="select" id="roleInput" required>
                            <option value="admin">Admin</option>
                            <option value="enseignant">Enseignant</option>
                            <option value="etudiant">Étudiant</option>
                        </select>
                    </label>
                    <label>
                        Classe / Spécialité
                        <input class="input" id="metaInput" type="text" required placeholder="L2 DSER">
                    </label>
                </div>
                <label>
                    Statut
                    <select class="select" id="statusInput" required>
                        <option value="Actif">Actif</option>
                        <option value="En attente">En attente</option>
                        <option value="Suspendu">Suspendu</option>
                    </select>
                </label>
                <div class="form-actions">
                    <button class="btn btn-ghost" id="cancelBtn" type="button">Annuler</button>
                    <button class="btn btn-primary" type="submit">
                        <i data-lucide="save"></i>
                        <span>Enregistrer</span>
                    </button>
                </div>
            </form>
        </div>
    </dialog>

    <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>

    <script>
        const state = {
            users: [
                {id: 1, name: "Awa Diop", email: "etudiant@emsp.local", role: "etudiant", meta: "L2 DSER", status: "Actif"},
                {id: 2, name: "Mamadou Fall", email: "mfall@emsp.local", role: "enseignant", meta: "Bases de données", status: "Actif"},
                {id: 3, name: "Admin EMSP", email: "admin@emsp.local", role: "admin", meta: "Administration", status: "Actif"},
                {id: 4, name: "Fatou Ndiaye", email: "fatou@emsp.local", role: "etudiant", meta: "L2 DSER", status: "En attente"}
            ],
            editingId: null
        };

        const usersBody = document.querySelector("#usersBody");
        const emptyState = document.querySelector("#emptyState");
        const searchInput = document.querySelector("#searchInput");
        const roleFilter = document.querySelector("#roleFilter");
        const userDialog = document.querySelector("#userDialog");
        const userForm = document.querySelector("#userForm");
        const dialogTitle = document.querySelector("#dialogTitle");
        const toastStack = document.querySelector("#toastStack");

        function initials(name) {
            return name.split(" ").map(part => part[0]).join("").slice(0, 2).toUpperCase();
        }

        function roleLabel(role) {
            return role.charAt(0).toUpperCase() + role.slice(1);
        }

        function filteredUsers() {
            const query = searchInput.value.trim().toLowerCase();
            const role = roleFilter.value;

            return state.users.filter(user => {
                const matchesRole = role === "all" || user.role === role;
                const haystack = `${user.name} ${user.email} ${user.role} ${user.meta}`.toLowerCase();
                return matchesRole && haystack.includes(query);
            });
        }

        function renderUsers() {
            const users = filteredUsers();
            usersBody.innerHTML = "";
            emptyState.classList.toggle("is-visible", users.length === 0);

            users.forEach(user => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>
                        <div class="user-cell">
                            <div class="avatar">${initials(user.name)}</div>
                            <div>
                                <div class="name">${user.name}</div>
                                <div class="email">${user.email}</div>
                            </div>
                        </div>
                    </td>
                    <td><span class="badge">${roleLabel(user.role)}</span></td>
                    <td>${user.meta}</td>
                    <td>${user.status}</td>
                    <td>
                        <div class="actions">
                            <button class="btn btn-ghost icon-btn" type="button" aria-label="Modifier" data-action="edit" data-id="${user.id}">
                                <i data-lucide="pencil"></i>
                            </button>
                            <button class="btn btn-danger icon-btn" type="button" aria-label="Supprimer" data-action="delete" data-id="${user.id}">
                                <i data-lucide="trash-2"></i>
                            </button>
                        </div>
                    </td>
                `;
                usersBody.appendChild(row);
            });

            lucide.createIcons();
        }

        function openDialog(user = null) {
            state.editingId = user ? user.id : null;
            dialogTitle.textContent = user ? "Modifier un utilisateur" : "Ajouter un utilisateur";
            document.querySelector("#userId").value = user ? user.id : "";
            document.querySelector("#nameInput").value = user ? user.name : "";
            document.querySelector("#emailInput").value = user ? user.email : "";
            document.querySelector("#roleInput").value = user ? user.role : "etudiant";
            document.querySelector("#metaInput").value = user ? user.meta : "";
            document.querySelector("#statusInput").value = user ? user.status : "Actif";
            userDialog.showModal();
        }

        function closeDialog() {
            userDialog.close();
            userForm.reset();
            state.editingId = null;
        }

        function showToast(message, type = "success") {
            const toast = document.createElement("div");
            toast.className = `toast ${type === "error" ? "error" : ""}`;
            toast.innerHTML = `
                <i data-lucide="${type === "error" ? "circle-alert" : "circle-check"}"></i>
                <span>${message}</span>
            `;
            toastStack.appendChild(toast);
            lucide.createIcons();

            window.setTimeout(() => {
                toast.remove();
            }, 3200);
        }

        function pulseButton(button) {
            button.classList.add("pulse");
            window.setTimeout(() => button.classList.remove("pulse"), 300);
        }

        document.querySelector("#addBtn").addEventListener("click", event => {
            pulseButton(event.currentTarget);
            openDialog();
        });

        document.querySelector("#closeDialogBtn").addEventListener("click", closeDialog);
        document.querySelector("#cancelBtn").addEventListener("click", closeDialog);

        searchInput.addEventListener("input", renderUsers);
        roleFilter.addEventListener("change", renderUsers);

        usersBody.addEventListener("click", event => {
            const button = event.target.closest("button");
            if (!button) return;

            pulseButton(button);
            const id = Number(button.dataset.id);
            const user = state.users.find(item => item.id === id);

            if (button.dataset.action === "edit") {
                openDialog(user);
            }

            if (button.dataset.action === "delete") {
                state.users = state.users.filter(item => item.id !== id);
                renderUsers();
                showToast("Utilisateur supprimé.");
            }
        });

        userForm.addEventListener("submit", event => {
            event.preventDefault();

            const payload = {
                id: state.editingId || Date.now(),
                name: document.querySelector("#nameInput").value.trim(),
                email: document.querySelector("#emailInput").value.trim(),
                role: document.querySelector("#roleInput").value,
                meta: document.querySelector("#metaInput").value.trim(),
                status: document.querySelector("#statusInput").value
            };

            if (!payload.name || !payload.email || !payload.meta) {
                showToast("Veuillez remplir tous les champs.", "error");
                return;
            }

            if (state.editingId) {
                state.users = state.users.map(user => user.id === state.editingId ? payload : user);
                showToast("Utilisateur modifié.");
            } else {
                state.users.unshift(payload);
                showToast("Utilisateur ajouté.");
            }

            closeDialog();
            renderUsers();
        });

        userDialog.addEventListener("click", event => {
            if (event.target === userDialog) {
                closeDialog();
            }
        });

        renderUsers();
    </script>
</body>
</html>
